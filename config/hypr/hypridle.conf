general {
    lock_cmd = pidof hyprlock || hyprlock       # что запускать для блокировки
    before_sleep_cmd = loginctl lock-session    # залочить перед сном
    after_sleep_cmd = hyprctl dispatch dpms on  # включить монитор после просыпания
}

listener {
    timeout = 300
    on-timeout = loginctl lock-session         # через 5 минут блокируем
}

listener {
    timeout = 400
    on-timeout = hyprctl dispatch dpms off     # через 6.5 минут выключаем экран
    on-resume = hyprctl dispatch dpms on       # включаем обратно при активности
}

background {
    monitor =
    color = rgb(0, 0, 0)
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    outer_color = rgb(127, 63, 191) # Твой 7f3fbf
    inner_color = rgb(0, 0, 0)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Input Password...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

# Индикатор раскладки (как ты просил)
label {
    monitor =
    text = $LAYOUT
    color = rgba(200, 200, 200, 1.0)
    font_size = 20
    position = 0, 80
    halign = center
    valign = center
}
