# ~/.config/hypr/hyprlauncher.conf

# Основные настройки лаунчера
general {
    # Захватывать ли фокус клавиатуры принудительно.
    # Рекомендуется оставить true для корректной работы.
    grab_focus = true
}

# Настройки кэширования часто используемых приложений
cache {
    # Включить кэширование истории запусков.
    # История хранится в ~/.local/share/hyprlauncher в текстовом виде.
    enabled = true
}

# Настройки модулей поиска (finder'ов)
# Доступные модули: desktop (приложения), math (калькулятор), unicode (символы)
finders {
    # Какой модуль использовать по умолчанию (desktop, math, unicode)
    default_finder = desktop

    # Префикс для принудительного поиска среди приложений.
    # Если оставить пустым, поиск идет везде.
    desktop_prefix = ""

    # Префикс для поиска unicode-символов (по умолчанию точка)
    # Например, ввод ".copyright" найдет символ копирайта.
    unicode_prefix = "."

    # Префикс для калькулятора (по умолчанию равно)
    # Например, ввод "= 25*4" покажет результат 100.
    math_prefix = "="

    # Префикс для запуска приложений (опционально).
    # Например, если вы используете UWSM, можно задать: desktop_launch_prefix = "uwsm app --"
    # desktop_launch_prefix = ""

    # Показывать ли иконки для .desktop файлов
    desktop_icons = true
}

# Настройки внешнего вида окна
ui {
    # Размер окна лаунчера в пикселях (ширина высота)
    window_size = 800 450
}
